<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>営業日報 - 入力</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e; --ink-light: #4a4a6a; --paper: #f5f3ee; --paper-dark: #ede9e0;
    --accent: #c84b31; --accent-light: #e86a4f; --gold: #c9a84c;
    --line: #d4cfc4; --white: #ffffff;
    --shadow: 0 4px 24px rgba(26,26,46,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

  .header {
    background: var(--ink); padding: 0 16px; display: flex; align-items: center;
    justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100;
  }
  .header-title { font-family: 'DM Serif Display', serif; color: var(--white); font-size: 18px; letter-spacing: 2px; }
  .header-nav { display: flex; gap: 20px; }
  .header-nav a { color: rgba(255,255,255,0.55); text-decoration: none; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 4px 0; }
  .header-nav a.active { color: var(--white); border-bottom: 1px solid var(--gold); }

  .container { max-width: 680px; margin: 0 auto; padding: 24px 16px 100px; }
  .page-heading { margin-bottom: 20px; }
  .page-heading h1 { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--ink); }
  .page-heading p { color: var(--ink-light); font-size: 12px; margin-top: 6px; }

  .card { background: var(--white); border-radius: 4px; box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }

  .field-group { margin-bottom: 14px; }
  .field-group:last-child { margin-bottom: 0; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }

  label { display: block; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-light); margin-bottom: 7px; }

  input[type="date"], select, textarea, input[type="text"] {
    width: 100%; padding: 13px 14px; border: 1.5px solid var(--line); border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 16px; color: var(--ink);
    background: var(--paper); transition: border-color 0.2s; appearance: none; -webkit-appearance: none;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); background: var(--white); }
  textarea { min-height: 110px; resize: vertical; line-height: 1.7; }

  .select-wrapper { position: relative; }
  .select-wrapper::after { content: '▾'; position: absolute; right: 13px; top: 50%; transform: translateY(-50%); color: var(--ink-light); pointer-events: none; }

  /* 訪問先ブロック */
  .visit-block {
    background: var(--white); border: 1.5px solid var(--line); border-radius: 4px;
    padding: 16px; margin-bottom: 12px; animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

  .visit-block-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .visit-block-number { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }

  .btn-remove {
    background: none; border: 1px solid var(--line); color: var(--ink-light);
    width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-remove:active { border-color: var(--accent); color: var(--accent); }

  /* 新規入力 */
  .new-name-wrap { margin-top: 10px; display: none; }
  .new-name-wrap.show { display: block; }
  .new-name-wrap input { border-color: var(--gold); background: #fffdf5; }
  .new-hint { font-size: 11px; color: var(--gold); margin-top: 5px; }

  /* グレーアウト select */
  select.disabled-look { opacity: 0.45; pointer-events: none; }

  .btn-add {
    width: 100%; padding: 15px; background: transparent; border: 1.5px dashed var(--line);
    border-radius: 4px; color: var(--ink-light); font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px; cursor: pointer; margin-bottom: 20px; -webkit-tap-highlight-color: transparent;
  }
  .btn-add:active { border-color: var(--accent); color: var(--accent); }

  .submit-area {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 16px; background: var(--white); border-top: 1px solid var(--line);
    box-shadow: 0 -4px 16px rgba(26,26,46,0.08); z-index: 50;
  }
  .btn-submit {
    width: 100%; padding: 16px; background: var(--accent); color: var(--white); border: none;
    border-radius: 4px; font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 700;
    letter-spacing: 3px; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .btn-submit:active { background: var(--accent-light); }
  .btn-submit:disabled { background: var(--line); cursor: not-allowed; }

  .toast {
    position: fixed; bottom: 80px; left: 16px; right: 16px; background: var(--ink); color: var(--white);
    padding: 16px 20px; border-radius: 4px; font-size: 13px; box-shadow: 0 8px 32px rgba(26,26,46,0.15);
    transform: translateY(20px); opacity: 0; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999; border-left: 3px solid var(--gold); text-align: center;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-left-color: var(--accent); }

  @media (min-width: 640px) {
    .header { padding: 0 40px; height: 64px; }
    .container { padding: 40px 24px 48px; }
    .card, .visit-block { padding: 28px; }
    .submit-area { position: static; background: none; border: none; box-shadow: none; padding: 0; display: flex; justify-content: flex-end; margin-top: 8px; }
    .btn-submit { width: auto; padding: 14px 48px; }
    .toast { bottom: 32px; left: auto; right: 32px; width: 320px; text-align: left; }
  }
</style>
</head>
<body>
<div class="header">
  <div class="header-title">営業日報</div>
  <nav class="header-nav">
    <a href="index.html" class="active">入力</a>
    <a href="list.html">一覧</a>
    <a href="admin.html">管理</a>
  </nav>
</div>

<div class="container">
  <div class="page-heading">
    <h1>日報を入力する</h1>
    <p>訪問先を追加して、話した内容を記録してください</p>
  </div>

  <div class="card">
    <div class="field-group" style="margin-bottom:0">
      <label>日付</label>
      <input type="date" id="report-date">
    </div>
  </div>

  <div id="visit-blocks"></div>
  <button class="btn-add" onclick="addVisitBlock()">＋ 訪問先を追加</button>

  <div class="submit-area">
    <button class="btn-submit" id="submit-btn" onclick="submitReport()">送　信</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const AREAS = ['国分','隼人','霧島','溝辺','牧園','福山','横川'];
const TYPES = ['本社','現場','新規'];

let companies = [];
let visitCount = 0;

async function init() {
  document.getElementById('report-date').value = new Date().toISOString().split('T')[0];
  const { data } = await db.from('companies').select('*').order('sort_order').order('name');
  companies = data || [];
  addVisitBlock();
}

function addVisitBlock() {
  visitCount++;
  const n = visitCount;
  const block = document.createElement('div');
  block.className = 'visit-block';
  block.id = `visit-${n}`;

  block.innerHTML = `
    <div class="visit-block-header">
      <span class="visit-block-number">訪問先 #${n}</span>
      <button class="btn-remove" onclick="removeVisitBlock(${n})">×</button>
    </div>
    <div class="field-row">
      <div>
        <label>地区</label>
        <div class="select-wrapper">
          <select id="area-${n}" onchange="onSelChange(${n})">
            <option value="">選択</option>
            ${AREAS.map(a=>`<option value="${a}">${a}</option>`).join('')}
          </select>
        </div>
      </div>
      <div>
        <label>種別</label>
        <div class="select-wrapper">
          <select id="type-${n}" onchange="onSelChange(${n})">
            <option value="">選択</option>
            ${TYPES.map(t=>`<option value="${t}">${t}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>
    <div class="field-group">
      <label>会社名 / 現場名</label>
      <div class="select-wrapper" id="co-sel-wrap-${n}">
        <select id="company-${n}" class="disabled-look">
          <option value="">← まず地区と種別を選択</option>
        </select>
      </div>
      <div class="new-name-wrap" id="new-wrap-${n}">
        <input type="text" id="new-name-${n}" placeholder="会社名を入力">
        <div class="new-hint">※ 新規顧客は直接入力してください</div>
      </div>
    </div>
    <div class="field-group" style="margin-bottom:0">
      <label>話した内容</label>
      <textarea id="content-${n}" placeholder="打ち合わせ内容、提案内容、次のアクションなど…"></textarea>
    </div>
  `;
  document.getElementById('visit-blocks').appendChild(block);
}

function onSelChange(n) {
  const area = document.getElementById(`area-${n}`).value;
  const type = document.getElementById(`type-${n}`).value;
  const sel = document.getElementById(`company-${n}`);
  const selWrap = document.getElementById(`co-sel-wrap-${n}`);
  const newWrap = document.getElementById(`new-wrap-${n}`);

  if (type === '新規') {
    selWrap.style.display = 'none';
    newWrap.classList.add('show');
    return;
  }

  selWrap.style.display = '';
  newWrap.classList.remove('show');

  if (!area || !type) {
    sel.className = 'disabled-look';
    sel.innerHTML = '<option value="">← まず地区と種別を選択</option>';
    return;
  }

  const filtered = companies.filter(c => c.area === area && c.type === type);
  sel.className = '';
  sel.innerHTML = filtered.length
    ? '<option value="">選択してください</option>' + filtered.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')
    : '<option value="">該当する会社がありません</option>';
}

function removeVisitBlock(n) {
  const el = document.getElementById(`visit-${n}`);
  if (el) { el.style.opacity='0'; el.style.transition='opacity 0.2s'; setTimeout(()=>el.remove(),200); }
}

async function submitReport() {
  const date = document.getElementById('report-date').value;
  if (!date) { showToast('日付を選択してください','error'); return; }

  const blocks = document.querySelectorAll('.visit-block');
  const items = [];

  for (const block of blocks) {
    const n = block.id.split('-')[1];
    const area = document.getElementById(`area-${n}`)?.value;
    const type = document.getElementById(`type-${n}`)?.value;
    const content = document.getElementById(`content-${n}`)?.value?.trim();

    if (!area) { showToast('地区を選択してください','error'); return; }
    if (!type) { showToast('種別を選択してください','error'); return; }
    if (!content) { showToast('話した内容を入力してください','error'); return; }

    if (type === '新規') {
      const newName = document.getElementById(`new-name-${n}`)?.value?.trim();
      if (!newName) { showToast('新規の会社名を入力してください','error'); return; }
      items.push({ company_id: null, company_name_free: newName, area, type, content });
    } else {
      const companyId = document.getElementById(`company-${n}`)?.value;
      if (!companyId) { showToast('会社名を選択してください','error'); return; }
      items.push({ company_id: companyId, company_name_free: null, area, type, content });
    }
  }

  if (!items.length) { showToast('訪問先を1件以上追加してください','error'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '送信中…';

  const { data: report, error: rErr } = await db.from('reports').insert({ report_date: date }).select().single();
  if (rErr) { showToast('送信に失敗しました','error'); btn.disabled=false; btn.textContent='送　信'; return; }

  const { error: iErr } = await db.from('report_items').insert(
    items.map(i => ({ report_id: report.id, company_id: i.company_id, company_name_free: i.company_name_free, area: i.area, type: i.type, content: i.content }))
  );
  if (iErr) { showToast('送信に失敗しました','error'); btn.disabled=false; btn.textContent='送　信'; return; }

  showToast('日報を送信しました ✓');
  setTimeout(() => {
    document.getElementById('visit-blocks').innerHTML = '';
    visitCount = 0; addVisitBlock();
    btn.disabled=false; btn.textContent='送　信';
  }, 1500);
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast${type==='error'?' error':''} show`;
  setTimeout(()=>t.className=t.className.replace(' show',''), 3000);
}

init();
</script>
</body>
</html>
