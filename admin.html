<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>営業日報 - 会社管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e; --ink-light: #4a4a6a; --paper: #f5f3ee; --paper-dark: #ede9e0;
    --accent: #c84b31; --accent-light: #e86a4f; --gold: #c9a84c;
    --line: #d4cfc4; --white: #ffffff;
    --shadow: 0 4px 24px rgba(26,26,46,0.10); --shadow-lg: 0 12px 40px rgba(26,26,46,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

  .header {
    background: var(--ink); padding: 0 16px; display: flex; align-items: center;
    justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100;
  }
  .header-title { font-family: 'DM Serif Display', serif; color: var(--white); font-size: 18px; letter-spacing: 2px; }
  .header-nav { display: flex; gap: 20px; }
  .header-nav a {
    color: rgba(255,255,255,0.55); text-decoration: none; font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase; padding: 4px 0;
  }
  .header-nav a.active { color: var(--white); border-bottom: 1px solid var(--gold); }

  .container { max-width: 700px; margin: 0 auto; padding: 24px 16px; }
  .page-heading { margin-bottom: 24px; }
  .page-heading h1 { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--ink); }
  .page-heading p { color: var(--ink-light); font-size: 12px; margin-top: 6px; }

  .card { background: var(--white); border-radius: 4px; box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
  .card h2 { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-light); margin-bottom: 16px; }

  .add-form { display: flex; flex-direction: column; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 8px; }
  label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-light); }
  input[type="text"], select {
    padding: 14px 16px; border: 1.5px solid var(--line); border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 16px; color: var(--ink);
    background: var(--paper); transition: border-color 0.2s; appearance: none; -webkit-appearance: none;
  }
  input[type="text"]:focus, select:focus { outline: none; border-color: var(--accent); background: var(--white); }
  .select-wrapper { position: relative; }
  .select-wrapper::after { content: '▾'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--ink-light); pointer-events: none; }

  .btn-add-co {
    padding: 14px; background: var(--accent); color: var(--white); border: none; border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 2px;
    cursor: pointer; transition: background 0.2s; -webkit-tap-highlight-color: transparent;
  }
  .btn-add-co:active { background: var(--accent-light); }

  .company-list { margin-top: 0; }
  .company-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0; border-bottom: 1px solid var(--paper-dark);
  }
  .company-item:last-child { border-bottom: none; }
  .company-item-left { display: flex; align-items: center; gap: 10px; }
  .type-badge {
    font-size: 9px; font-weight: 700; letter-spacing: 1px; padding: 3px 8px;
    border-radius: 2px; color: var(--white); background: var(--ink-light);
  }
  .type-badge.honsha { background: var(--accent); }
  .co-name { font-size: 14px; color: var(--ink); }
  .btn-del {
    background: none; border: 1px solid var(--line); color: var(--ink-light);
    width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    flex-shrink: 0; -webkit-tap-highlight-color: transparent;
  }
  .btn-del:active { border-color: var(--accent); color: var(--accent); background: rgba(200,75,49,0.06); }

  .empty-list { padding: 32px; text-align: center; color: var(--ink-light); font-size: 13px; }

  .toast {
    position: fixed; bottom: 24px; left: 16px; right: 16px;
    background: var(--ink); color: var(--white); padding: 16px 20px; border-radius: 4px;
    font-size: 13px; box-shadow: var(--shadow-lg); transform: translateY(80px); opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 999; border-left: 3px solid var(--gold);
    text-align: center;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-left-color: var(--accent); }

  @media (min-width: 640px) {
    .header { padding: 0 40px; height: 64px; }
    .container { padding: 48px 24px; }
    .card { padding: 32px; }
    .add-form { flex-direction: row; align-items: flex-end; }
    .field:first-child { flex: 1; }
    .btn-add-co { white-space: nowrap; padding: 14px 24px; }
    .toast { left: auto; right: 32px; width: 320px; text-align: left; bottom: 32px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">営業日報</div>
  <nav class="header-nav">
    <a href="index.html">入力</a>
    <a href="list.html">一覧</a>
    <a href="admin.html" class="active">管理</a>
  </nav>
</div>

<div class="container">
  <div class="page-heading">
    <h1>会社・現場を管理する</h1>
    <p>プルダウンに表示される会社名・現場名を追加・削除できます</p>
  </div>

  <div class="card">
    <h2>新しく追加</h2>
    <div class="add-form">
      <div class="field">
        <label>会社名 / 現場名</label>
        <input type="text" id="new-name" placeholder="例：○○建設、第三現場" maxlength="50">
      </div>
      <div class="field" style="min-width:110px">
        <label>種別</label>
        <div class="select-wrapper">
          <select id="new-type">
            <option value="本社">本社</option>
            <option value="現場">現場</option>
          </select>
        </div>
      </div>
      <button class="btn-add-co" onclick="addCompany()">追加</button>
    </div>
  </div>

  <div class="card">
    <h2>登録済み一覧</h2>
    <div class="company-list" id="company-list">
      <div class="empty-list">読み込み中…</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadCompanies() {
  const { data, error } = await db.from('companies').select('*').order('type').order('name');
  const list = document.getElementById('company-list');
  if (error || !data?.length) {
    list.innerHTML = '<div class="empty-list">会社がまだ登録されていません</div>';
    return;
  }
  list.innerHTML = data.map(c => `
    <div class="company-item" id="co-${c.id}">
      <div class="company-item-left">
        <span class="type-badge ${c.type === '本社' ? 'honsha' : ''}">${c.type}</span>
        <span class="co-name">${escHtml(c.name)}</span>
      </div>
      <button class="btn-del" onclick="deleteCompany('${c.id}', '${escHtml(c.name)}')" title="削除">×</button>
    </div>
  `).join('');
}

async function addCompany() {
  const name = document.getElementById('new-name').value.trim();
  const type = document.getElementById('new-type').value;
  if (!name) { showToast('会社名を入力してください', 'error'); return; }
  const { error } = await db.from('companies').insert({ name, type });
  if (error) { showToast('追加に失敗しました', 'error'); return; }
  document.getElementById('new-name').value = '';
  showToast(`「${name}」を追加しました`);
  loadCompanies();
}

async function deleteCompany(id, name) {
  if (!confirm(`「${name}」を削除しますか？`)) return;
  const { error } = await db.from('companies').delete().eq('id', id);
  if (error) { showToast('削除に失敗しました', 'error'); return; }
  showToast(`「${name}」を削除しました`);
  loadCompanies();
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast${type === 'error' ? ' error' : ''} show`;
  setTimeout(() => t.className = t.className.replace(' show', ''), 3000);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('new-name').addEventListener('keydown', e => { if (e.key === 'Enter') addCompany(); });

loadCompanies();
</script>
</body>
</html>
