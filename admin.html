<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>営業日報 - 会社管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e; --ink-light: #4a4a6a; --paper: #f5f3ee; --paper-dark: #ede9e0;
    --accent: #c84b31; --accent-light: #e86a4f; --gold: #c9a84c;
    --line: #d4cfc4; --white: #ffffff;
    --shadow: 0 4px 24px rgba(26,26,46,0.10); --shadow-lg: 0 12px 40px rgba(26,26,46,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--ink); }
  .login-box { background: var(--white); padding: 48px 40px; width: 360px; border-radius: 2px; box-shadow: var(--shadow-lg); text-align: center; }
  .login-logo { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--ink); letter-spacing: 2px; margin-bottom: 4px; }
  .login-sub { font-size: 11px; color: var(--ink-light); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 36px; padding-bottom: 24px; border-bottom: 1px solid var(--line); }
  .login-box input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--line); border-radius: 2px; font-family: 'Noto Sans JP', sans-serif; font-size: 15px; color: var(--ink); background: var(--paper); margin-bottom: 16px; transition: border-color 0.2s; }
  .login-box input:focus { outline: none; border-color: var(--accent); }
  .btn-primary { width: 100%; padding: 14px; background: var(--accent); color: var(--white); border: none; border-radius: 2px; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 2px; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: var(--accent-light); }
  .login-error { color: var(--accent); font-size: 12px; margin-top: 12px; display: none; }

  #app { display: none; }
  .header { background: var(--ink); padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; }
  .header-title { font-family: 'DM Serif Display', serif; color: var(--white); font-size: 20px; letter-spacing: 2px; }
  .header-nav { display: flex; gap: 24px; align-items: center; }
  .header-nav a { color: rgba(255,255,255,0.55); text-decoration: none; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; transition: color 0.2s; }
  .header-nav a:hover, .header-nav a.active { color: var(--white); }
  .header-nav a.active { border-bottom: 1px solid var(--gold); padding-bottom: 2px; }

  .container { max-width: 700px; margin: 0 auto; padding: 48px 24px; }
  .page-heading { margin-bottom: 40px; }
  .page-heading h1 { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--ink); }
  .page-heading p { color: var(--ink-light); font-size: 13px; margin-top: 8px; }

  .card { background: var(--white); border-radius: 2px; box-shadow: var(--shadow); padding: 32px; margin-bottom: 24px; }
  .card h2 { font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-light); margin-bottom: 20px; }

  .add-form { display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: end; }
  .field { display: flex; flex-direction: column; gap: 8px; }
  label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-light); }
  input[type="text"], select {
    padding: 11px 14px; border: 1.5px solid var(--line); border-radius: 2px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px; color: var(--ink);
    background: var(--paper); transition: border-color 0.2s; appearance: none; -webkit-appearance: none;
  }
  input[type="text"]:focus, select:focus { outline: none; border-color: var(--accent); background: var(--white); }
  .select-wrapper { position: relative; }
  .select-wrapper::after { content: '▾'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--ink-light); pointer-events: none; font-size: 11px; }

  .btn-add-co {
    padding: 11px 20px; background: var(--accent); color: var(--white); border: none; border-radius: 2px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 2px;
    cursor: pointer; white-space: nowrap; transition: background 0.2s; height: 44px; align-self: end;
  }
  .btn-add-co:hover { background: var(--accent-light); }

  /* 会社リスト */
  .company-list { margin-top: 0; }
  .company-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0; border-bottom: 1px solid var(--paper-dark); animation: fadeIn 0.2s ease;
  }
  .company-item:last-child { border-bottom: none; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .company-item-left { display: flex; align-items: center; gap: 12px; }
  .type-badge {
    font-size: 9px; font-weight: 700; letter-spacing: 1px; padding: 3px 8px;
    border-radius: 1px; color: var(--white); background: var(--ink-light);
  }
  .type-badge.honsha { background: var(--accent); }
  .co-name { font-size: 14px; color: var(--ink); }
  .btn-del {
    background: none; border: 1px solid var(--line); color: var(--ink-light);
    width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .btn-del:hover { border-color: var(--accent); color: var(--accent); background: rgba(200,75,49,0.06); }

  .empty-list { padding: 32px; text-align: center; color: var(--ink-light); font-size: 13px; }

  .toast { position: fixed; bottom: 32px; right: 32px; background: var(--ink); color: var(--white); padding: 16px 24px; border-radius: 2px; font-size: 13px; box-shadow: var(--shadow-lg); transform: translateY(80px); opacity: 0; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 999; border-left: 3px solid var(--gold); }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-left-color: var(--accent); }

  @media (max-width: 600px) {
    .add-form { grid-template-columns: 1fr; }
    .header { padding: 0 16px; }
    .container { padding: 24px 16px; }
    .card { padding: 20px; }
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">営業日報</div>
    <div class="login-sub">Company Admin</div>
    <input type="password" id="password-input" placeholder="管理者パスワード" autocomplete="current-password">
    <button class="btn-primary" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="login-error">管理者パスワードが違います</div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="header-title">営業日報</div>
    <nav class="header-nav">
      <a href="index.html">日報入力</a>
      <a href="list.html">一覧</a>
      <a href="admin.html" class="active">会社管理</a>
    </nav>
  </div>

  <div class="container">
    <div class="page-heading">
      <h1>会社・現場を管理する</h1>
      <p>プルダウンに表示される会社名・現場名を追加・削除できます</p>
    </div>

    <div class="card">
      <h2>新しく追加</h2>
      <div class="add-form">
        <div class="field">
          <label>会社名 / 現場名</label>
          <input type="text" id="new-name" placeholder="例：○○建設、第三現場" maxlength="50">
        </div>
        <div class="field">
          <label>種別</label>
          <div class="select-wrapper">
            <select id="new-type">
              <option value="本社">本社</option>
              <option value="現場">現場</option>
            </select>
          </div>
        </div>
        <button class="btn-add-co" onclick="addCompany()">追加</button>
      </div>
    </div>

    <div class="card">
      <h2>登録済み一覧</h2>
      <div class="company-list" id="company-list">
        <div class="empty-list">読み込み中…</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function doLogin() {
  const pw = document.getElementById('password-input').value;
  if (pw === PASSWORDS.admin) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    sessionStorage.setItem('auth', 'admin');
    loadCompanies();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
document.getElementById('password-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

if (sessionStorage.getItem('auth') === 'admin') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadCompanies();
}

async function loadCompanies() {
  const { data, error } = await db.from('companies').select('*').order('type').order('name');
  const list = document.getElementById('company-list');
  if (error || !data?.length) {
    list.innerHTML = '<div class="empty-list">会社がまだ登録されていません</div>';
    return;
  }
  list.innerHTML = data.map(c => `
    <div class="company-item" id="co-${c.id}">
      <div class="company-item-left">
        <span class="type-badge ${c.type === '本社' ? 'honsha' : ''}">${c.type}</span>
        <span class="co-name">${escHtml(c.name)}</span>
      </div>
      <button class="btn-del" onclick="deleteCompany('${c.id}', '${escHtml(c.name)}')" title="削除">×</button>
    </div>
  `).join('');
}

async function addCompany() {
  const name = document.getElementById('new-name').value.trim();
  const type = document.getElementById('new-type').value;
  if (!name) { showToast('会社名を入力してください', 'error'); return; }

  const { error } = await db.from('companies').insert({ name, type });
  if (error) { showToast('追加に失敗しました', 'error'); return; }

  document.getElementById('new-name').value = '';
  showToast(`「${name}」を追加しました`);
  loadCompanies();
}

async function deleteCompany(id, name) {
  if (!confirm(`「${name}」を削除しますか？\n※ 関連する日報データは残ります`)) return;
  const { error } = await db.from('companies').delete().eq('id', id);
  if (error) { showToast('削除に失敗しました', 'error'); return; }
  showToast(`「${name}」を削除しました`);
  loadCompanies();
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast${type === 'error' ? ' error' : ''} show`;
  setTimeout(() => t.className = t.className.replace(' show', ''), 3000);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
