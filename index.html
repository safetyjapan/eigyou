<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>営業日報 - 入力</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --ink-light: #4a4a6a;
    --paper: #f5f3ee;
    --paper-dark: #ede9e0;
    --accent: #c84b31;
    --accent-light: #e86a4f;
    --gold: #c9a84c;
    --line: #d4cfc4;
    --white: #ffffff;
    --shadow: 0 4px 24px rgba(26,26,46,0.10);
    --shadow-lg: 0 12px 40px rgba(26,26,46,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  .header {
    background: var(--ink);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-title {
    font-family: 'DM Serif Display', serif;
    color: var(--white);
    font-size: 18px;
    letter-spacing: 2px;
  }

  .header-nav {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .header-nav a {
    color: rgba(255,255,255,0.55);
    text-decoration: none;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: color 0.2s;
    padding: 4px 0;
  }

  .header-nav a:hover, .header-nav a.active { color: var(--white); }
  .header-nav a.active { border-bottom: 1px solid var(--gold); }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 32px 16px 80px;
  }

  .page-heading {
    margin-bottom: 28px;
  }

  .page-heading h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    color: var(--ink);
  }

  .page-heading p {
    color: var(--ink-light);
    font-size: 12px;
    margin-top: 6px;
  }

  .card {
    background: var(--white);
    border-radius: 4px;
    box-shadow: var(--shadow);
    padding: 20px;
    margin-bottom: 16px;
  }

  .field-group {
    margin-bottom: 20px;
  }

  .field-group:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 8px;
  }

  input[type="date"],
  select,
  textarea {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--line);
    border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px; /* 16px以上でiOSズームしない */
    color: var(--ink);
    background: var(--paper);
    transition: border-color 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }

  input[type="date"]:focus,
  select:focus,
  textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--white);
  }

  textarea {
    min-height: 120px;
    resize: vertical;
    line-height: 1.7;
  }

  .select-wrapper {
    position: relative;
  }

  .select-wrapper::after {
    content: '▾';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-light);
    pointer-events: none;
    font-size: 12px;
  }

  /* 訪問先ブロック */
  .visit-block {
    background: var(--white);
    border: 1.5px solid var(--line);
    border-radius: 4px;
    padding: 20px;
    margin-bottom: 12px;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .visit-block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .visit-block-number {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .btn-remove {
    background: none;
    border: 1px solid var(--line);
    color: var(--ink-light);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-remove:active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,75,49,0.06);
  }

  .btn-add {
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 1.5px dashed var(--line);
    border-radius: 4px;
    color: var(--ink-light);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    margin-bottom: 24px;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-add:active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,75,49,0.03);
  }

  /* 送信ボタン - スマホは画面下に固定 */
  .submit-area {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 16px;
    background: var(--white);
    border-top: 1px solid var(--line);
    box-shadow: 0 -4px 16px rgba(26,26,46,0.08);
    z-index: 50;
  }

  .btn-submit {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: var(--white);
    border: none;
    border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-submit:active { background: var(--accent-light); }
  .btn-submit:disabled { background: var(--line); cursor: not-allowed; }

  .toast {
    position: fixed;
    bottom: 80px;
    left: 16px;
    right: 16px;
    background: var(--ink);
    color: var(--white);
    padding: 16px 20px;
    border-radius: 4px;
    font-size: 13px;
    box-shadow: var(--shadow-lg);
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999;
    border-left: 3px solid var(--gold);
    text-align: center;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-left-color: var(--accent); }

  /* PC向け調整 */
  @media (min-width: 640px) {
    .header { padding: 0 40px; height: 64px; }
    .header-title { font-size: 20px; }
    .container { padding: 48px 24px 48px; }
    .page-heading h1 { font-size: 32px; }
    .card { padding: 32px; }
    .visit-block { padding: 24px; }

    .submit-area {
      position: static;
      background: none;
      border: none;
      box-shadow: none;
      padding: 0;
      display: flex;
      justify-content: flex-end;
    }

    .btn-submit {
      width: auto;
      padding: 14px 48px;
    }

    .toast {
      bottom: 32px;
      left: auto;
      right: 32px;
      width: 320px;
      text-align: left;
    }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">営業日報</div>
  <nav class="header-nav">
    <a href="index.html" class="active">入力</a>
    <a href="list.html">一覧</a>
    <a href="admin.html">管理</a>
  </nav>
</div>

<div class="container">
  <div class="page-heading">
    <h1>日報を入力する</h1>
    <p>訪問先を追加して、話した内容を記録してください</p>
  </div>

  <div class="card">
    <div class="field-group" style="margin-bottom:0">
      <label>日付</label>
      <input type="date" id="report-date">
    </div>
  </div>

  <div id="visit-blocks"></div>

  <button class="btn-add" onclick="addVisitBlock()">＋ 訪問先を追加</button>

  <div class="submit-area">
    <button class="btn-submit" id="submit-btn" onclick="submitReport()">送　信</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let companies = [];
let visitCount = 0;

async function init() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('report-date').value = today;

  const { data, error } = await db.from('companies').select('*').order('name');
  if (error) { showToast('会社一覧の取得に失敗しました', 'error'); return; }
  companies = data || [];
  addVisitBlock();
}

function addVisitBlock() {
  visitCount++;
  const container = document.getElementById('visit-blocks');
  const block = document.createElement('div');
  block.className = 'visit-block';
  block.id = `visit-${visitCount}`;

  const options = companies.map(c =>
    `<option value="${c.id}">[${c.type}] ${c.name}</option>`
  ).join('');

  block.innerHTML = `
    <div class="visit-block-header">
      <span class="visit-block-number">訪問先 #${visitCount}</span>
      <button class="btn-remove" onclick="removeVisitBlock(${visitCount})" title="削除">×</button>
    </div>
    <div class="field-group">
      <label>会社名 / 現場名</label>
      <div class="select-wrapper">
        <select id="company-${visitCount}">
          <option value="">選択してください</option>
          ${options}
        </select>
      </div>
    </div>
    <div class="field-group" style="margin-bottom:0">
      <label>話した内容</label>
      <textarea id="content-${visitCount}" placeholder="打ち合わせ内容、提案内容、次のアクションなど…"></textarea>
    </div>
  `;
  container.appendChild(block);
}

function removeVisitBlock(num) {
  const el = document.getElementById(`visit-${num}`);
  if (el) {
    el.style.opacity = '0';
    el.style.transform = 'translateY(-6px)';
    el.style.transition = 'all 0.2s';
    setTimeout(() => el.remove(), 200);
  }
}

async function submitReport() {
  const date = document.getElementById('report-date').value;
  if (!date) { showToast('日付を選択してください', 'error'); return; }

  const blocks = document.querySelectorAll('.visit-block');
  const items = [];

  for (const block of blocks) {
    const id = block.id.split('-')[1];
    const companyId = document.getElementById(`company-${id}`)?.value;
    const content = document.getElementById(`content-${id}`)?.value?.trim();
    if (!companyId) { showToast('会社名を選択してください', 'error'); return; }
    if (!content) { showToast('話した内容を入力してください', 'error'); return; }
    items.push({ company_id: companyId, content });
  }

  if (items.length === 0) { showToast('訪問先を1件以上追加してください', 'error'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '送信中…';

  const { data: report, error: rError } = await db
    .from('reports').insert({ report_date: date }).select().single();

  if (rError) {
    showToast('送信に失敗しました', 'error');
    btn.disabled = false; btn.textContent = '送　信'; return;
  }

  const { error: iError } = await db.from('report_items').insert(
    items.map(item => ({ report_id: report.id, company_id: item.company_id, content: item.content }))
  );

  if (iError) {
    showToast('送信に失敗しました', 'error');
    btn.disabled = false; btn.textContent = '送　信'; return;
  }

  showToast('日報を送信しました ✓');
  setTimeout(() => {
    document.getElementById('visit-blocks').innerHTML = '';
    visitCount = 0;
    addVisitBlock();
    btn.disabled = false;
    btn.textContent = '送　信';
  }, 1500);
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast${type === 'error' ? ' error' : ''} show`;
  setTimeout(() => t.className = t.className.replace(' show', ''), 3000);
}

init();
</script>
</body>
</html>
