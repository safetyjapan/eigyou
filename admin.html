<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>営業日報 - 会社管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e; --ink-light: #4a4a6a; --paper: #f5f3ee; --paper-dark: #ede9e0;
    --accent: #c84b31; --accent-light: #e86a4f; --gold: #c9a84c;
    --line: #d4cfc4; --white: #ffffff;
    --shadow: 0 4px 24px rgba(26,26,46,0.10); --shadow-lg: 0 12px 40px rgba(26,26,46,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

  .header {
    background: var(--ink); padding: 0 16px; display: flex; align-items: center;
    justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100;
  }
  .header-title { font-family: 'DM Serif Display', serif; color: var(--white); font-size: 18px; letter-spacing: 2px; }
  .header-nav { display: flex; gap: 20px; }
  .header-nav a { color: rgba(255,255,255,0.55); text-decoration: none; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 4px 0; }
  .header-nav a.active { color: var(--white); border-bottom: 1px solid var(--gold); }

  .container { max-width: 700px; margin: 0 auto; padding: 24px 16px 48px; }
  .page-heading { margin-bottom: 20px; }
  .page-heading h1 { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--ink); }
  .page-heading p { color: var(--ink-light); font-size: 12px; margin-top: 6px; }

  .card { background: var(--white); border-radius: 4px; box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
  .card h2 { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-light); margin-bottom: 14px; }

  .add-form { display: flex; flex-direction: column; gap: 10px; }
  .add-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-light); display: block; margin-bottom: 6px; }

  input[type="text"], select {
    width: 100%; padding: 13px 14px; border: 1.5px solid var(--line); border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 16px; color: var(--ink);
    background: var(--paper); appearance: none; -webkit-appearance: none; transition: border-color 0.2s;
  }
  input[type="text"]:focus, select:focus { outline: none; border-color: var(--accent); background: var(--white); }

  .select-wrapper { position: relative; }
  .select-wrapper::after { content: '▾'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--ink-light); pointer-events: none; }

  .btn-add-co {
    padding: 13px; background: var(--accent); color: var(--white); border: none; border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 2px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .btn-add-co:active { background: var(--accent-light); }

  /* ソートバー */
  .sort-bar {
    display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
  }
  .sort-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-light); white-space: nowrap; }
  .sort-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn-sort {
    padding: 6px 14px; border: 1.5px solid var(--line); border-radius: 20px; background: transparent;
    font-family: 'Noto Sans JP', sans-serif; font-size: 12px; color: var(--ink-light); cursor: pointer;
    transition: all 0.15s; -webkit-tap-highlight-color: transparent; white-space: nowrap;
  }
  .btn-sort:active, .btn-sort.active { background: var(--ink); border-color: var(--ink); color: var(--white); }

  /* 並び替え保存バー */
  .save-order-bar {
    display: none; align-items: center; justify-content: space-between;
    background: var(--ink); color: var(--white); padding: 12px 16px; border-radius: 4px;
    margin-bottom: 12px; font-size: 13px;
  }
  .save-order-bar.show { display: flex; }
  .btn-save-order {
    padding: 8px 18px; background: var(--gold); color: var(--ink); border: none; border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .btn-save-order:active { opacity: 0.8; }

  /* 会社リスト */
  .company-list { user-select: none; }

  /* 地区グループヘッダー */
  .area-group-label {
    font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: var(--ink-light); padding: 14px 0 6px; display: flex; align-items: center; gap: 10px;
  }
  .area-group-label::after { content: ''; flex: 1; height: 1px; background: var(--line); }

  .company-item {
    display: flex; align-items: center; gap: 8px;
    padding: 11px 0; border-bottom: 1px solid var(--paper-dark);
    transition: background 0.15s;
  }
  .company-item:last-child { border-bottom: none; }
  .company-item.dragging { opacity: 0.4; }
  .company-item.drag-over { background: var(--paper); border-radius: 4px; }

  .drag-handle { color: var(--line); font-size: 18px; cursor: grab; padding: 4px 2px; flex-shrink: 0; touch-action: none; }
  /* ソート時はドラッグ無効化 */
  .drag-handle.disabled { opacity: 0.2; cursor: default; pointer-events: none; }

  .company-item-info { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; flex-wrap: wrap; }

  .badge { font-size: 9px; font-weight: 700; letter-spacing: 1px; padding: 2px 7px; border-radius: 2px; color: var(--white); white-space: nowrap; flex-shrink: 0; }
  .badge-area { background: var(--ink-light); }
  .badge-type { background: var(--ink); }
  .badge-type.honsha { background: var(--accent); }

  .co-name { font-size: 14px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .item-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .btn-edit {
    background: none; border: 1px solid var(--line); color: var(--ink-light);
    width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent;
  }
  .btn-edit:active { border-color: var(--gold); color: var(--gold); }

  .btn-del {
    background: none; border: 1px solid var(--line); color: var(--ink-light);
    width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent;
  }
  .btn-del:active { border-color: var(--accent); color: var(--accent); }

  .empty-list { padding: 28px; text-align: center; color: var(--ink-light); font-size: 13px; }

  /* モーダル */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(26,26,46,0.55);
    z-index: 200; display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: auto; }

  .modal {
    background: var(--white); width: 100%; max-width: 480px; border-radius: 12px 12px 0 0;
    padding: 28px 20px 32px; box-shadow: var(--shadow-lg);
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
  }
  .modal-overlay.show .modal { transform: translateY(0); }

  .modal-handle { width: 40px; height: 4px; background: var(--line); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--ink); margin-bottom: 20px; }

  .modal-field { margin-bottom: 16px; }
  .modal-field:last-of-type { margin-bottom: 0; }

  .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 24px; }

  .btn-modal-cancel {
    padding: 14px; background: transparent; border: 1.5px solid var(--line); border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px; color: var(--ink-light); cursor: pointer;
  }
  .btn-modal-save {
    padding: 14px; background: var(--accent); color: var(--white); border: none; border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .btn-modal-save:active { background: var(--accent-light); }
  .btn-modal-save:disabled { background: var(--line); cursor: not-allowed; }

  .toast {
    position: fixed; bottom: 24px; left: 16px; right: 16px; background: var(--ink); color: var(--white);
    padding: 16px 20px; border-radius: 4px; font-size: 13px; box-shadow: var(--shadow-lg);
    transform: translateY(80px); opacity: 0; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999; border-left: 3px solid var(--gold); text-align: center;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-left-color: var(--accent); }

  @media (min-width: 640px) {
    .header { padding: 0 40px; height: 64px; }
    .container { padding: 40px 24px; }
    .card { padding: 28px; }
    .add-form { flex-direction: row; align-items: flex-end; flex-wrap: wrap; }
    .add-row { flex: 1; min-width: 280px; }
    .btn-add-co { white-space: nowrap; align-self: flex-end; }
    .modal-overlay { align-items: center; }
    .modal { border-radius: 8px; max-width: 440px; }
    .toast { left: auto; right: 32px; width: 320px; text-align: left; bottom: 32px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">営業日報</div>
  <nav class="header-nav">
    <a href="index.html">入力</a>
    <a href="list.html">一覧</a>
    <a href="admin.html" class="active">管理</a>
  </nav>
</div>

<div class="container">
  <div class="page-heading">
    <h1>会社・現場を管理する</h1>
    <p>並び替え・編集・追加・削除ができます</p>
  </div>

  <div class="card">
    <h2>新しく追加</h2>
    <div class="add-form">
      <div class="add-row">
        <div style="margin-bottom:10px">
          <label>会社名 / 現場名</label>
          <input type="text" id="new-name" placeholder="例：○○建設、第三現場" maxlength="50">
        </div>
        <div style="margin-bottom:10px">
          <label>地区</label>
          <div class="select-wrapper">
            <select id="new-area">
              <option value="">選択してください</option>
              <option>国分</option><option>隼人</option><option>霧島</option>
              <option>溝辺</option><option>牧園</option><option>福山</option><option>横川</option>
            </select>
          </div>
        </div>
      </div>
      <div style="margin-bottom:10px; min-width:110px">
        <label>種別</label>
        <div class="select-wrapper">
          <select id="new-type">
            <option value="本社">本社</option>
            <option value="現場">現場</option>
          </select>
        </div>
      </div>
      <button class="btn-add-co" onclick="addCompany()">追加</button>
    </div>
  </div>

  <div class="card">
    <h2>登録済み一覧</h2>

    <!-- ソートバー -->
    <div class="sort-bar">
      <span class="sort-label">並び替え</span>
      <div class="sort-btns">
        <button class="btn-sort" id="sort-manual" onclick="setSort('manual')">手動順</button>
        <button class="btn-sort" id="sort-area" onclick="setSort('area')">地区ごと</button>
        <button class="btn-sort" id="sort-kana" onclick="setSort('kana')">五十音順</button>
      </div>
    </div>

    <div class="save-order-bar" id="save-order-bar">
      <span>順番が変更されました</span>
      <button class="btn-save-order" onclick="saveOrder()">保存する</button>
    </div>

    <div class="company-list" id="company-list">
      <div class="empty-list">読み込み中…</div>
    </div>
  </div>
</div>

<!-- 編集モーダル -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">会社情報を編集</div>
    <div class="modal-field">
      <label>会社名 / 現場名</label>
      <input type="text" id="edit-name" maxlength="50">
    </div>
    <div class="modal-field">
      <label>地区</label>
      <div class="select-wrapper">
        <select id="edit-area">
          <option value="">選択してください</option>
          <option>国分</option><option>隼人</option><option>霧島</option>
          <option>溝辺</option><option>牧園</option><option>福山</option><option>横川</option>
        </select>
      </div>
    </div>
    <div class="modal-field">
      <label>種別</label>
      <div class="select-wrapper">
        <select id="edit-type">
          <option value="本社">本社</option>
          <option value="現場">現場</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-modal-save" id="btn-modal-save" onclick="saveEdit()">保存する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const AREA_ORDER = ['国分','隼人','霧島','溝辺','牧園','福山','横川'];

let companyData = [];
let currentSort = 'manual'; // 'manual' | 'area' | 'kana'
let dragSrc = null;
let editingId = null;

// ========== 読み込み・描画 ==========

async function loadCompanies() {
  const { data, error } = await db.from('companies').select('*').order('sort_order').order('name');
  if (error || !data?.length) {
    document.getElementById('company-list').innerHTML = '<div class="empty-list">会社がまだ登録されていません</div>';
    companyData = [];
    return;
  }
  companyData = data;
  renderList();
}

function getSortedData() {
  if (currentSort === 'area') {
    return [...companyData].sort((a, b) => {
      const ai = AREA_ORDER.indexOf(a.area || '');
      const bi = AREA_ORDER.indexOf(b.area || '');
      if (ai !== bi) return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
      return (a.name || '').localeCompare(b.name || '', 'ja');
    });
  }
  if (currentSort === 'kana') {
    return [...companyData].sort((a, b) => (a.name || '').localeCompare(b.name || '', 'ja'));
  }
  return companyData; // manual
}

function setSort(mode) {
  currentSort = mode;
  document.querySelectorAll('.btn-sort').forEach(b => b.classList.remove('active'));
  document.getElementById(`sort-${mode}`).classList.add('active');
  // 手動順以外では保存バーを隠す
  if (mode !== 'manual') document.getElementById('save-order-bar').classList.remove('show');
  renderList();
}

function renderList() {
  const list = document.getElementById('company-list');
  if (!companyData.length) {
    list.innerHTML = '<div class="empty-list">会社がまだ登録されていません</div>';
    return;
  }

  list.innerHTML = '';
  const sorted = getSortedData();
  const isDraggable = currentSort === 'manual';

  if (currentSort === 'area') {
    // 地区グループ表示
    const groups = {};
    sorted.forEach(c => {
      const a = c.area || '（地区未設定）';
      if (!groups[a]) groups[a] = [];
      groups[a].push(c);
    });
    Object.entries(groups).forEach(([area, items]) => {
      const label = document.createElement('div');
      label.className = 'area-group-label';
      label.textContent = area;
      list.appendChild(label);
      items.forEach((c, idx) => list.appendChild(makeItem(c, idx, false)));
    });
  } else {
    sorted.forEach((c, idx) => list.appendChild(makeItem(c, idx, isDraggable)));
  }
}

function makeItem(c, idx, draggable) {
  const item = document.createElement('div');
  item.className = 'company-item';
  item.dataset.id = c.id;
  item.dataset.idx = idx;
  item.draggable = draggable;

  item.innerHTML = `
    <div class="drag-handle ${draggable ? '' : 'disabled'}" title="${draggable ? 'ドラッグで並び替え' : '手動順のみ並び替え可'}">⠿</div>
    <div class="company-item-info">
      ${c.area ? `<span class="badge badge-area">${escHtml(c.area)}</span>` : ''}
      <span class="badge badge-type ${c.type==='本社'?'honsha':''}">${escHtml(c.type)}</span>
      <span class="co-name">${escHtml(c.name)}</span>
    </div>
    <div class="item-actions">
      <button class="btn-edit" onclick="openModal('${c.id}')" title="編集">✎</button>
      <button class="btn-del" onclick="deleteCompany('${c.id}','${escHtml(c.name)}')" title="削除">×</button>
    </div>
  `;

  if (draggable) {
    // PC ドラッグ
    item.addEventListener('dragstart', e => {
      dragSrc = item; item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
      document.querySelectorAll('.company-item').forEach(el => el.classList.remove('drag-over'));
    });
    item.addEventListener('dragover', e => {
      e.preventDefault();
      if (dragSrc && dragSrc !== item) item.classList.add('drag-over');
    });
    item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
    item.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragSrc || dragSrc === item) return;
      item.classList.remove('drag-over');
      const from = parseInt(dragSrc.dataset.idx);
      const to = parseInt(item.dataset.idx);
      const [moved] = companyData.splice(from, 1);
      companyData.splice(to, 0, moved);
      document.getElementById('save-order-bar').classList.add('show');
      renderList();
    });

    // スマホ タッチ
    let touchItem = null;
    item.addEventListener('touchstart', () => { touchItem = item; }, { passive: true });
    item.addEventListener('touchmove', e => {
      e.preventDefault();
      const t = e.touches[0];
      const els = document.elementsFromPoint(t.clientX, t.clientY);
      const target = els.find(el => el.classList.contains('company-item') && el !== touchItem);
      document.querySelectorAll('.company-item').forEach(el => el.classList.remove('drag-over'));
      if (target) target.classList.add('drag-over');
    }, { passive: false });
    item.addEventListener('touchend', e => {
      const t = e.changedTouches[0];
      const els = document.elementsFromPoint(t.clientX, t.clientY);
      const target = els.find(el => el.classList.contains('company-item') && el !== touchItem);
      document.querySelectorAll('.company-item').forEach(el => el.classList.remove('drag-over'));
      if (target && touchItem) {
        const from = parseInt(touchItem.dataset.idx);
        const to = parseInt(target.dataset.idx);
        const [moved] = companyData.splice(from, 1);
        companyData.splice(to, 0, moved);
        document.getElementById('save-order-bar').classList.add('show');
        renderList();
      }
    });
  }

  return item;
}

// ========== 並び替え保存 ==========

async function saveOrder() {
  await Promise.all(companyData.map((c, i) =>
    db.from('companies').update({ sort_order: i }).eq('id', c.id)
  ));
  document.getElementById('save-order-bar').classList.remove('show');
  showToast('並び順を保存しました');
}

// ========== 追加 ==========

async function addCompany() {
  const name = document.getElementById('new-name').value.trim();
  const area = document.getElementById('new-area').value;
  const type = document.getElementById('new-type').value;
  if (!name) { showToast('会社名を入力してください','error'); return; }
  if (!area) { showToast('地区を選択してください','error'); return; }
  const { error } = await db.from('companies').insert({ name, area, type, sort_order: companyData.length });
  if (error) { showToast('追加に失敗しました','error'); return; }
  document.getElementById('new-name').value = '';
  showToast(`「${name}」を追加しました`);
  loadCompanies();
}

// ========== 編集モーダル ==========

function openModal(id) {
  const c = companyData.find(c => c.id === id);
  if (!c) return;
  editingId = id;
  document.getElementById('edit-name').value = c.name;
  document.getElementById('edit-area').value = c.area || '';
  document.getElementById('edit-type').value = c.type;
  document.getElementById('modal-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('edit-name').focus(), 300);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  document.body.style.overflow = '';
  editingId = null;
}

function closeModalOnBg(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

async function saveEdit() {
  const name = document.getElementById('edit-name').value.trim();
  const area = document.getElementById('edit-area').value;
  const type = document.getElementById('edit-type').value;
  if (!name) { showToast('会社名を入力してください','error'); return; }
  if (!area) { showToast('地区を選択してください','error'); return; }

  const btn = document.getElementById('btn-modal-save');
  btn.disabled = true; btn.textContent = '保存中…';
  const { error } = await db.from('companies').update({ name, area, type }).eq('id', editingId);
  btn.disabled = false; btn.textContent = '保存する';

  if (error) { showToast('更新に失敗しました','error'); return; }
  showToast(`「${name}」を更新しました`);
  closeModal();
  loadCompanies();
}

// ========== 削除 ==========

async function deleteCompany(id, name) {
  if (!confirm(`「${name}」を削除しますか？`)) return;
  const { error } = await db.from('companies').delete().eq('id', id);
  if (error) { showToast('削除に失敗しました','error'); return; }
  showToast(`「${name}」を削除しました`);
  loadCompanies();
}

// ========== ユーティリティ ==========

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast${type==='error'?' error':''} show`;
  setTimeout(() => t.className = t.className.replace(' show',''), 3000);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('new-name').addEventListener('keydown', e => { if (e.key==='Enter') addCompany(); });
document.getElementById('edit-name').addEventListener('keydown', e => { if (e.key==='Enter') saveEdit(); });
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

// 初期ソートボタンをアクティブに
setSort('manual');
loadCompanies();
